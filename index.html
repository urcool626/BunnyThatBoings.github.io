<!DOCTYPE html>

<html lang="en">
  
<head>
  
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  
  <title>Efficient Demon List (v1.1)</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  
  <style>
    
    * {
      
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      
    }

    :root {
      
      --bg: #1c1b22;
      --color-bg: #2b2a33;
      --color-border: #3a3944;
      --body-width: 80rem;
      --spacing: 1.25rem;
      --border-radius: calc(var(--spacing) * 0.5);
      
    }

    body {
      
      background: var(--bg);
      color: #ffffff;
      font-family: "Inter", sans-serif;
      width: min(var(--body-width), 100% - var(--spacing));
      margin-inline: auto;
      padding-block: var(--spacing);
      
    }

    h1 {
      
      font-size: 1.75rem;
      font-weight: 700;
      
    }

    p {
      
      font-size: 0.875rem;
      color: #aaaaaa;
      margin-top: 0.25rem;
      
    }

    hr {
      
      border-color: var(--color-border);
      margin-block: var(--spacing);
      
    }

    #list > * {
      
      margin-top: var(--spacing);
      
    }

    #list a {
      
      display: flex;
      flex-flow: row nowrap;
      align-items: center;
      gap: var(--spacing);
      background: var(--color-bg);
      padding: var(--spacing);
      border-radius: var(--border-radius);
      border: none;
      overflow: hidden;
      text-decoration: none;
      color: #ffffff;
      transition: filter 0.15s ease;
     
      &:hover {
        
        filter: brightness(1.1);
        
      }
      
    }

    #list a .thumb {
      
      flex-shrink: 0;
      width: min(12rem, 40%);
      border-radius: var(--border-radius);
      overflow: hidden;
      
    }

    #list a .thumb img {
      
      width: 100%;
      height: auto;
      display: block;
      border: none;
      
    }
 
    #list a .info {
      
      flex: 1;
      min-width: 0;
      
    }

    #list a .info .name {
      
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: calc(var(--spacing) * 0.5);
      
    }

    #list a .info .url {
      
      font-style: italic;
      font-size: 0.8rem;
      color: #888888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      
    }

    #list a .rank {
      
      flex-shrink: 0;
      color: #888888;
      font-size: 0.95rem;
      
    }
    
  </style>
  
</head>
  
<body>

  <h1>Efficient Demon List (v1.1)</h1>
  
  <p>made by CircularCyclone & ThePastaNebula</p>
    
  <hr />
  
  <div id="list"></div>

  <script>
    
    /* -------------------------------------------------------
       EDIT PLACEMENTS HERE // DO NOT TOUCH ANYTHING ELSE
    ------------------------------------------------------- */
    
    const videos = [
      
      { name: "Amethyst", url: "https://www.youtube.com/watch?v=4lfkzz1VCbA" },
      { name: "Thinking Space II", url: "https://www.youtube.com/watch?v=CELNmHwln_c" },
      { name: "Tidal Wave", url: "https://www.youtube.com/watch?v=9fsZ014qB3s" },
      { name: "ORBIT", url: "https://www.youtube.com/watch?v=QKcv8DkNPd0" },
      { name: "Flamewall", url: "https://www.youtube.com/watch?v=x4Io4zkWVRw" },
      { name: "Sakupen circles", url: "https://www.youtube.com/watch?v=AdrmZsy52EY" },
      { name: "Nullscapes", url: "https://www.youtube.com/watch?v=EztneTPp5CU" },
      { name: "Quanteuse processing", url: "https://www.youtube.com/watch?v=j5NC0u1Q91Q" },
      { name: "BOOBAWAMBA", url: "https://www.youtube.com/watch?v=20fYiqLAo_E" },
      { name: "Every End", url: "https://www.youtube.com/watch?v=AO--mVVFtKI" },
      { name: "KILLSTEALER", url: "https://www.youtube.com/watch?v=uhH4oqWrsfo" },
      { name: "Penumbral", url: "https://www.youtube.com/watch?v=nVHPFf13M-I" },
      { name: "Ultra Paracosm", url: "https://www.youtube.com/watch?v=4V24spYQWuE" },
      { name: "roses and flowers", url: "https://www.youtube.com/watch?v=5QeIp5fC1hE" },
      { name: "Subsuming Vortex", url: "https://www.youtube.com/watch?v=0eYG1ogJpIQ" },
      { name: "Silent clubstep", url: "https://www.youtube.com/watch?v=GR4OMkS3SN8" },
      { name: "andromeda", url: "https://www.youtube.com/watch?v=3PuK6AFY3BI" },
      { name: "Ashley Wave Trials", url: "https://www.youtube.com/watch?v=aTxt76U3e2Q" },
      { name: "Avernus", url: "https://www.youtube.com/watch?v=16Zh8jssanc" },
      { name: "Anathema", url: "https://www.youtube.com/watch?v=_uKwmjHmySI" },
      { name: "Lesopawol", url: "https://www.youtube.com/watch?v=RTXnFHkGO_g" },
      { name: "Aquamarine", url: "https://www.youtube.com/watch?v=Q__EnRojGt4" },
      { name: "Acheron", url: "https://www.youtube.com/watch?v=sBKR6aUorzA" },
      { name: "Spectre", url: "https://www.youtube.com/watch?v=MzsSLKJrLSI" },
      { name: "Menace", url: "https://www.youtube.com/watch?v=nnkgghxxsEE" },
      { name: "Abyss of Darkness", url: "https://www.youtube.com/watch?v=ejJkpqcMMCY" },
      { name: "Abyss of Darkness", url: "https://www.youtube.com/watch?v=RWBEfS4mLbw" },
      { name: "Defeated Circles", url: "https://www.youtube.com/watch?v=nU5AQPzd2YA" },
      { name: "SWI Slithium", url: "https://www.youtube.com/watch?v=av5D0_M6hso" },
      { name: "Tunnel of Despair", url: "https://www.youtube.com/watch?v=LpS4JREhW98" },
      
    ];

    function getVideoId(url) {
      
      const match = url.match(/[?&]v=([^&]+)/);
      return match ? match[1] : null;
      
    }

    const list = document.getElementById('list');

    for (let l = 0; l < videos.length; l++) {

      const v = videos[l];
      const id = getVideoId(v.url);
      const thumbSrc = v.thumb || (id ? `https://img.youtube.com/vi/${id}/mqdefault.jpg` : null);
      const thumbHTML = thumbSrc
        
        ? `<img src="${thumbSrc}" alt="thumbnail" />`
        
        : `<span class="play-tri"></span>`;
      
      const a = document.createElement('a');
      a.href = v.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = `
        <div class="thumb">
        
        ${thumbHTML}</div>
        
        <div class="info">
        
        <div class="name">
        
        ${v.name}</div>
        
        <div class="url">
          
        ${v.url}</div>
          
        </div>
        
        <div class="rank">
        
        ${String(l + 1).padStart(2, '0')}</div>`;

      list.appendChild(a);
    }
    
  </script>

</body>
  
</html>
